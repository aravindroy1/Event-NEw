---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: kgateway
spec:
  controllerName: kgateway.dev/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: event-management
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: event-routes
  namespace: event-management
spec:
  parentRefs:
  - name: main-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /users
    backendRefs:
    - name: user-service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /events
    backendRefs:
    - name: event-service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /booking
    backendRefs:
    - name: booking-service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /tickets
    backendRefs:
    - name: ticket-service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /payment
    backendRefs:
    - name: payment-service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /notifications
    backendRefs:
    - name: notification-service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 80

